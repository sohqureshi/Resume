<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume — Loading…</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f6f2;
  --panel:#ffffff;
  --ink:#1c2321;
  --muted:#5c6560;
  --line:#e1e4de;
  --accent:#0d6e5e;
  --accent-soft:#e1f0ec;
  --accent2:#3a4a7a;
  --accent2-soft:#eaedf7;
  --amber:#a3661c;
  --amber-soft:#f6ead8;
  --radius:8px;
  --serif:'Fraunces', Georgia, 'Times New Roman', serif;
  --sans:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --mono:'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.55;-webkit-font-smoothing:antialiased;}

/* ---------- screen chrome ---------- */
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 20px;background:rgba(246,246,242,0.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
.topbar .brand{font-family:var(--mono);font-size:12.5px;color:var(--muted);letter-spacing:0.02em;}
.topbar .brand b{color:var(--ink);}
.btn{font-family:var(--mono);font-size:13px;font-weight:500;border-radius:8px;padding:9px 16px;border:1px solid var(--line);background:var(--panel);color:var(--ink);cursor:pointer;transition:transform .12s ease, box-shadow .12s ease;display:inline-flex;align-items:center;gap:8px;}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(20,30,25,0.08);}
.btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
.btn.primary{background:var(--ink);color:#fbfbf9;border-color:var(--ink);}
.btn.primary:hover{background:#000;}
.btn:disabled{opacity:0.45;cursor:not-allowed;transform:none;box-shadow:none;}
.btn svg{width:14px;height:14px;}

.sheet{max-width:960px;margin:0 auto;padding:40px 28px 90px;}

/* ---------- header ---------- */
header.hero{padding-bottom:22px;margin-bottom:26px;border-bottom:2px solid var(--ink);}
.eyebrow{font-family:var(--mono);font-size:11.5px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);margin:0 0 10px;}
h1.name{font-family:var(--serif);font-size:clamp(30px,4.6vw,44px);font-weight:600;letter-spacing:-0.01em;margin:0 0 6px;}
.role{font-size:16px;color:var(--muted);margin:0 0 16px;font-weight:500;}
.role .sep{color:var(--line);margin:0 8px;}
.role span.tag{color:var(--accent2);font-weight:600;}
.contact-row{display:flex;flex-wrap:wrap;gap:9px 18px;font-family:var(--mono);font-size:12px;}
.contact-row a,.contact-row span{color:var(--ink);text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
.contact-row a{border-bottom:1px solid var(--line);padding-bottom:1px;}
.contact-row a:hover{border-color:var(--accent);color:var(--accent);}
.contact-row svg{width:13px;height:13px;opacity:0.7;}

/* ---------- two column layout ---------- */
.layout{display:grid;grid-template-columns:255px 1fr;gap:34px;align-items:start;}
.side, .main{min-width:0;}
.side > section, .main > section{margin-bottom:26px;}
.sec-head{font-family:var(--mono);font-size:11.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--accent2);margin:0 0 12px;display:flex;align-items:center;gap:9px;white-space:nowrap;}
.sec-head::after{content:"";flex:1;height:1px;background:var(--line);}

/* side panels */
.side .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;}
.skill-row{padding:7px 0;border-bottom:1px dashed var(--line);}
.skill-row:last-child{border-bottom:none;}
.skill-key{font-family:var(--mono);font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:5px;}
.chip-list{display:flex;flex-wrap:wrap;gap:5px;}
.chip{font-family:var(--mono);font-size:11px;background:var(--accent2-soft);color:var(--accent2);padding:2px 7px;border-radius:5px;white-space:nowrap;}
.edu-item{margin-bottom:11px;font-size:13px;}
.edu-item:last-child{margin-bottom:0;}
.edu-item .deg{font-weight:600;}
.edu-item .school{color:var(--muted);font-size:12px;}
.edu-item .yr{font-family:var(--mono);font-size:10.5px;color:var(--accent);}
.ach{font-size:13px;margin-bottom:11px;}
.ach:last-child{margin-bottom:0;}
.ach b{display:block;color:var(--ink);margin-bottom:2px;}
.ach span{color:var(--muted);}
.lang-list{display:flex;flex-wrap:wrap;gap:7px;}
.lang-chip{font-size:12px;padding:3px 9px;border-radius:20px;background:var(--accent-soft);color:var(--accent);font-family:var(--mono);}

/* main column */
p.summary{font-size:14.5px;color:#2b3033;max-width:70ch;}
.job{position:relative;padding-left:20px;margin-bottom:20px;border-left:2px solid var(--accent-soft);}
.job:last-child{margin-bottom:0;}
.job::before{content:"";position:absolute;left:-6px;top:5px;width:9px;height:9px;border-radius:50%;background:var(--accent);}
.job-head{display:flex;flex-wrap:wrap;align-items:baseline;justify-content:space-between;gap:6px 14px;margin-bottom:2px;}
.job-title{font-size:15px;font-weight:600;}
.job-title .co{color:var(--accent);}
.job-meta{font-family:var(--mono);font-size:11px;color:#fff;background:var(--accent2);padding:2px 8px;border-radius:10px;white-space:nowrap;}
.job-loc{font-size:12px;color:var(--muted);margin-bottom:7px;}
ul.bullets{margin:0;padding-left:0;list-style:none;}
ul.bullets li{position:relative;padding-left:16px;margin-bottom:4px;font-size:13.5px;color:#2b3033;}
ul.bullets li::before{content:"▸";position:absolute;left:0;color:var(--accent2);font-size:11px;top:2px;}

.project{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--amber);border-radius:var(--radius);padding:13px 16px;margin-bottom:12px;}
.project:last-child{margin-bottom:0;}
.project-head{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:baseline;gap:5px 14px;margin-bottom:3px;}
.project-title{font-weight:600;font-size:14px;}
.project-client{color:var(--muted);font-weight:400;font-size:12px;}
.project-date{font-family:var(--mono);font-size:10.5px;color:var(--amber);}
.project p{margin:5px 0;font-size:13px;color:#2b3033;}
.stack-line{font-family:var(--mono);font-size:10.5px;color:var(--amber);background:var(--amber-soft);display:inline-block;padding:2px 8px;border-radius:5px;margin-top:5px;}

footer.foot{margin-top:32px;padding-top:16px;border-top:1px solid var(--line);font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;}

/* ---------- loading / error ---------- */
.state-screen{max-width:560px;margin:80px auto;padding:0 20px;text-align:center;font-family:var(--mono);color:var(--muted);}
.state-screen .spinner{width:26px;height:26px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;margin:0 auto 18px;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.state-screen h2{font-size:14px;color:var(--ink);margin:0 0 10px;}
.state-screen p{font-size:12.5px;line-height:1.7;}
.state-screen code{display:block;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:10px 12px;margin:14px 0;text-align:left;color:var(--accent2);font-size:11.5px;overflow-x:auto;}

@media (max-width:760px){
  .layout{grid-template-columns:1fr;}
  .topbar{padding:10px 14px;}
  .sheet{padding:26px 16px 60px;}
}

/* ===================================================================
   PRINT — two-column dossier layout tuned to fit content onto the
   fewest possible pages without cutting anything. Sidebar (skills,
   education, achievements, languages) runs parallel to the timeline
   (summary, experience, projects) instead of stacking beneath it.
=================================================================== */
@media print{
  @page{ size:A4; margin:9mm 11mm; }
  .topbar{ display:none; }
  body{
    background:#fff; color:#191d1a;
    font-family:'Inter', Arial, Helvetica, sans-serif;
    font-size:8.7pt; line-height:1.34;
    print-color-adjust:exact; -webkit-print-color-adjust:exact;
  }
  .sheet{ max-width:100%; padding:0; }

  header.hero{ border-bottom:1.6pt solid #191d1a; padding-bottom:8pt; margin-bottom:9pt; }
  .eyebrow{ font-size:7.6pt; color:#0d6e5e; margin-bottom:3pt; }
  h1.name{ font-family:'Fraunces', Georgia, serif; font-size:19pt; margin-bottom:2pt; }
  .role{ font-size:9.6pt; margin-bottom:6pt; }
  .role span.tag{ color:#3a4a7a; }
  .contact-row{ font-size:7.8pt; gap:3pt 12pt; }
  .contact-row a{ color:#0d6e5e; border-bottom:none; font-weight:500; }
  .contact-row svg{ width:9px; height:9px; stroke:#0d6e5e; }

  .layout{ display:grid; grid-template-columns:56mm 1fr; gap:7mm; align-items:start; }
  .side > section, .main > section{ margin-bottom:9pt; break-inside:avoid; }

  .sec-head{ font-size:7.6pt; color:#3a4a7a; margin-bottom:5pt; letter-spacing:0.05em; }
  .sec-head::after{ background:#dfe3de; }

  .side .panel{ border:0.6pt solid #dde1db; border-radius:5px; padding:7pt 9pt; background:#fbfcfa; }
  .skill-row{ padding:3.5pt 0; border-bottom:0.5pt dashed #dfe3de; }
  .skill-key{ font-size:6.6pt; margin-bottom:2.5pt; }
  .chip{ font-size:6.9pt; padding:1.4pt 5pt; border-radius:4px; background:#eaedf7; color:#2a3670; }
  .edu-item{ margin-bottom:6pt; }
  .edu-item .deg{ font-size:8.1pt; }
  .edu-item .school{ font-size:7.3pt; }
  .edu-item .yr{ font-size:6.6pt; color:#0d6e5e; }
  .ach{ margin-bottom:6pt; }
  .ach b{ font-size:8.1pt; color:#0d6e5e; }
  .ach span{ font-size:7.3pt; }
  .lang-list{ gap:4pt; }
  .lang-chip{ font-size:7.3pt; padding:2pt 6pt; background:#e1f0ec; color:#0d6e5e; }

  p.summary{ font-size:8.7pt; max-width:100%; }

  .job{ padding-left:11pt; margin-bottom:8pt; border-left:1.3pt solid #e1f0ec; break-inside:avoid; }
  .job::before{ left:-4.5pt; top:3.5pt; width:6.5pt; height:6.5pt; }
  .job-title{ font-size:8.9pt; }
  .job-meta{ font-size:6.9pt; padding:1.4pt 6pt; }
  .job-loc{ font-size:7.3pt; margin-bottom:3pt; }
  ul.bullets li{ font-size:8.1pt; padding-left:10pt; margin-bottom:2pt; }
  ul.bullets li::before{ font-size:7pt; }

  .project{ border:0.6pt solid #dde1db; border-left:2pt solid #a3661c; border-radius:5px; padding:6.5pt 9pt; margin-bottom:6.5pt; background:#fefdfb; break-inside:avoid; }
  .project-title{ font-size:8.5pt; }
  .project-client{ font-size:7pt; }
  .project-date{ font-size:6.9pt; }
  .project p{ font-size:7.8pt; margin:3pt 0; }
  .stack-line{ font-size:6.7pt; padding:1.6pt 6pt; margin-top:3pt; }

  footer.foot{ display:block; margin-top:8pt; padding-top:6pt; font-size:6.3pt; }
  a{ color:#0d6e5e !important; }
}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><b>resume</b>.render(<span id="dataFileLabel">resume-data.json</span>)</div>
  <button class="btn primary" id="downloadBtn" onclick="window.print()" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v3a1 1 0 001 1h14a1 1 0 001-1v-3"/></svg>
    Download PDF
  </button>
</div>

<div id="app">
  <div class="state-screen" id="loadingState">
    <div class="spinner"></div>
    <h2>loading resume-data.json…</h2>
    <p>Reading structured content and rendering the page.</p>
  </div>
</div>

<script>
async function loadResume() {
  const app = document.getElementById('app');
  try {
    const res = await fetch('resume-data.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    render(data);
    document.getElementById('downloadBtn').disabled = false;
  } catch (err) {
    app.innerHTML = errorScreen(err);
  }
}

function errorScreen(err) {
  return `
  <div class="state-screen">
    <h2>Couldn't load resume-data.json</h2>
    <p>${escapeHtml(String(err.message || err))}</p>
    <p>This usually happens when the HTML file is opened directly (<code style="display:inline;padding:1px 5px;">file://</code>) — browsers block local JSON fetches for security. Serve both files from a local folder instead:</p>
    <code>python3 -m http.server 8000<br>&nbsp;&nbsp;# then open http://localhost:8000/index.html</code>
    <p>Or use a tool like VS Code's "Live Server" extension. Make sure <b>index.html</b> and <b>resume-data.json</b> are in the same folder.</p>
  </div>`;
}

function escapeHtml(str){
  return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function chip(text){ return `<span class="chip">${text}</span>`; }

function render(data) {
  document.title = `${data.name} — ${data.title}`;
  const roleTags = data.titleTags.map(t => `<span class="tag">${t}</span>`).join(' · ');

  const contactBits = [];
  if (data.contact.email) {
    contactBits.push(`<a href="mailto:${data.contact.email}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18v12H3z"/><path d="M3 6l9 7 9-7"/></svg>
      ${data.contact.email}
    </a>`);
  }
  if (data.contact.phone) {
    contactBits.push(`<span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.13.96.36 1.9.68 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.91.32 1.85.55 2.81.68A2 2 0 0122 16.92z"/></svg>
      ${data.contact.phone}
    </span>`);
  }
  if (data.contact.github) contactBits.push(`<a href="${data.contact.github}">GitHub</a>`);
  if (data.contact.linkedin) contactBits.push(`<a href="${data.contact.linkedin}">LinkedIn</a>`);
  if (data.location) contactBits.push(`<span>${data.location}</span>`);

  const skillsHtml = data.skills.map(row => `
    <div class="skill-row">
      <div class="skill-key">${row.key.replace(/_/g,' ')}</div>
      <div class="chip-list">${row.items.map(chip).join('')}</div>
    </div>`).join('');

  const experienceHtml = data.experience.map(job => `
    <div class="job">
      <div class="job-head">
        <div class="job-title">${job.title} <span class="co">@ ${job.company}</span></div>
        <div class="job-meta">${job.dates}</div>
      </div>
      <div class="job-loc">${job.location}</div>
      <ul class="bullets">${job.bullets.map(b => `<li>${b}</li>`).join('')}</ul>
    </div>`).join('');

  const projectsHtml = data.projects.map(p => `
    <div class="project">
      <div class="project-head">
        <div class="project-title">${p.title} <span class="project-client">— ${p.client}</span></div>
        <div class="project-date">${p.dates}</div>
      </div>
      <p>${p.description}</p>
      <span class="stack-line">${p.stack.join(' · ')}</span>
    </div>`).join('');

  const educationHtml = data.education.map(e => `
    <div class="edu-item">
      <div class="deg">${e.degree}</div>
      <div class="school">${e.school}</div>
      <div class="yr">${e.years}</div>
    </div>`).join('');

  const achievementsHtml = data.achievements.map(a => `
    <div class="ach">
      <b>${a.title}</b>
      <span>${a.description}</span>
    </div>`).join('');

  const languagesHtml = data.languages.map(l => `
    <span class="lang-chip">${l.name} — ${l.level}</span>`).join('');

  document.getElementById('app').innerHTML = `
  <div class="sheet">
    <header class="hero">
      <p class="eyebrow">Resume · Updated ${data.lastUpdated}</p>
      <h1 class="name">${data.name}</h1>
      <p class="role">${data.title} <span class="sep">/</span> ${roleTags}</p>
      <div class="contact-row">${contactBits.join('')}</div>
    </header>

    <div class="layout">
      <div class="side">
        <section id="skills">
          <p class="sec-head">Skills</p>
          <div class="panel">${skillsHtml}</div>
        </section>

        <section id="education">
          <p class="sec-head">Education</p>
          <div class="panel">${educationHtml}</div>
        </section>

        <section id="achievements">
          <p class="sec-head">Achievements</p>
          <div class="panel">${achievementsHtml}</div>
        </section>

        <section id="languages">
          <p class="sec-head">Languages</p>
          <div class="panel"><div class="lang-list">${languagesHtml}</div></div>
        </section>
      </div>

      <div class="main">
        <section id="summary">
          <p class="sec-head">Summary</p>
          <p class="summary">${data.summary}</p>
        </section>

        <section id="experience">
          <p class="sec-head">Experience</p>
          ${experienceHtml}
        </section>

        <section id="projects">
          <p class="sec-head">Selected Projects</p>
          ${projectsHtml}
        </section>
      </div>
    </div>

    <footer class="foot">
      Last updated ${data.lastUpdated} · Generated as a living document — click "Download PDF" above for a portable copy
    </footer>
  </div>
  `;
}

loadResume();
</script>
</body>
</html>
