<style>
:root{
  --bg:#f6f6f2;
  --panel:#ffffff;
  --ink:#1c2321;
  --muted:#5c6560;
  --line:#e1e4de;
  --accent:#0d6e5e;
  --accent-soft:#e1f0ec;
  --accent2:#3a4a7a;
  --accent2-soft:#eaedf7;
  --amber:#a3661c;
  --amber-soft:#f6ead8;
  --radius:8px;
  --serif:'Fraunces', Georgia, 'Times New Roman', serif;
  --sans:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --mono:'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.55;-webkit-font-smoothing:antialiased;}

/* ---------- screen chrome ---------- */
.topbar{position:sticky;top:0;z-index:50;background:rgba(246,246,242,0.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
.topbar-inner{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:10px;padding:12px 20px;}
.topbar .brand{font-family:var(--mono);font-size:12.5px;color:var(--muted);letter-spacing:0.02em;}
.topbar .brand b{color:var(--ink);}
.topbar nav{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-start;}
.nav-link{font-family:var(--mono);font-size:12px;color:var(--muted);text-decoration:none;padding:8px 12px;border-radius:999px;border:1px solid transparent;transition:background .15s ease,border-color .15s ease,color .15s ease;}
.nav-link:hover,.nav-link.active{background:var(--accent-soft);color:var(--accent);border-color:var(--line);}
.search-group{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:var(--panel);}
.search-group input{border:none;outline:none;background:transparent;color:var(--ink);font-family:var(--sans);font-size:13px;min-width:180px;width:100%;}
.search-group input::placeholder{color:var(--muted);}
.search-group button{font-family:var(--mono);font-size:12px;color:var(--accent2);border:none;background:transparent;cursor:pointer;padding:0 4px;}
.search-group button:hover{color:var(--accent);}
.btn{font-family:var(--mono);font-size:13px;font-weight:500;border-radius:8px;padding:9px 16px;border:1px solid var(--line);background:var(--panel);color:var(--ink);cursor:pointer;transition:transform .12s ease,box-shadow .12s ease;display:inline-flex;align-items:center;gap:8px;}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(20,30,25,0.08);}
.btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
.btn.primary{background:var(--ink);color:#fbfbf9;border-color:var(--ink);}
.btn.primary:hover{background:#000;}
.btn:disabled{opacity:0.45;cursor:not-allowed;transform:none;box-shadow:none;}
.btn svg{width:14px;height:14px;}

.sheet{max-width:1080px;margin:0 auto;padding:32px 28px 60px;background:rgba(255,255,255,0.96);box-shadow:0 20px 60px rgba(31,38,35,0.08);border-radius:18px;}
  
/* ---------- header ---------- */
header.hero{padding:28px 28px 24px;margin-bottom:24px;background:linear-gradient(180deg, rgba(13,110,94,0.06), rgba(255,255,255,0.9));border:1px solid var(--line);border-radius:18px;}
.eyebrow{font-family:var(--mono);font-size:11.5px;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);margin:0 0 14px;}
h1.name{font-family:var(--serif);font-size:clamp(34px,5vw,48px);font-weight:700;letter-spacing:-0.02em;margin:0 0 12px;}
.role{font-size:16.5px;color:var(--ink);margin:0 0 20px;font-weight:500;line-height:1.6;}
.role .sep{color:var(--line);margin:0 10px;}
.role span.tag{color:var(--accent2);font-weight:700;display:inline-flex;align-items:center;gap:4px;}
.contact-row{display:flex;flex-wrap:wrap;gap:10px 16px;font-family:var(--mono);font-size:13px;}
.contact-row a,.contact-row span{color:var(--ink);text-decoration:none;display:inline-flex;align-items:center;gap:8px;padding:10px 12px;border-radius:999px;background:rgba(255,255,255,0.9);border:1px solid transparent;transition:background .2s ease,border-color .2s ease,color .2s ease;}
.contact-row a:hover{border-color:var(--accent-soft);background:var(--accent-soft);color:var(--accent);}
.contact-row svg{width:14px;height:14px;opacity:0.72;}
.hero .tag{font-size:13px;background:var(--accent-soft);color:var(--accent2);padding:4px 10px;border-radius:999px;}
  
/* ---------- content layout ---------- */
.layout-grid{display:grid;grid-template-columns:minmax(0,1.7fr) minmax(240px,0.9fr);gap:24px;align-items:start;}
.section-stack{display:grid;gap:24px;}
.full-width-section{display:grid;gap:10px;}
.sec-head{font-family:var(--mono);font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent2);margin:0 0 16px;display:flex;align-items:center;gap:10px;white-space:nowrap;}
.sec-head::after{content:"";flex:1;height:1px;background:var(--line);} 
.sec-head.no-divider::after{display:none;}
  
/* panels */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px 18px;}
.skill-row{padding:10px 0;border-bottom:1px dashed var(--line);}
.skill-row:last-child{border-bottom:none;}
.skill-key{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px;}
.chip-list{display:flex;flex-wrap:wrap;gap:8px;}
.chip{font-family:var(--mono);font-size:11px;background:var(--accent2-soft);color:var(--accent2);padding:5px 10px;border-radius:999px;white-space:nowrap;}
.edu-item{margin-bottom:14px;font-size:13.5px;}
.edu-item:last-child{margin-bottom:0;}
.edu-item .deg{font-weight:700;}
.edu-item .school{color:var(--muted);font-size:12px;}
.edu-item .yr{font-family:var(--mono);font-size:10.5px;color:var(--accent);margin-top:4px;}
.ach{font-size:13.5px;margin-bottom:14px;}
.ach:last-child{margin-bottom:0;}
.ach b{display:block;color:var(--ink);margin-bottom:5px;}
.ach span{color:var(--muted);line-height:1.65;}
.lang-list{display:flex;flex-wrap:wrap;gap:8px;}
.lang-chip{font-size:12px;padding:5px 11px;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-family:var(--mono);}
  
/* main content */
.summary{font-size:15px;color:#2b3033;white-space:pre-wrap;margin:0;line-height:1.75;}
.job{position:relative;padding:22px 22px 18px 22px;margin-bottom:16px;border-left:3px solid var(--accent-soft);background:rgba(255,255,255,0.98);border:1px solid var(--line);border-radius:16px;}
.job:last-child{margin-bottom:0;}
.job::before{content:"";position:absolute;left:-8px;top:18px;width:12px;height:12px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px rgba(13,110,94,0.08);}
.job-head{display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;}
.job-title{font-size:16px;font-weight:700;line-height:1.2;}
.job-title .co{color:var(--accent);font-weight:600;}
.job-meta{font-family:var(--mono);font-size:11px;color:#fff;background:var(--accent2);padding:5px 10px;border-radius:999px;white-space:nowrap;}
.job-loc{font-size:13px;color:var(--muted);margin-bottom:12px;}
ul.bullets{margin:0;padding-left:0;list-style:none;}
ul.bullets li{position:relative;padding-left:18px;margin-bottom:10px;font-size:14px;color:#2b3033;line-height:1.7;}
ul.bullets li::before{content:"▸";position:absolute;left:0;top:2px;color:var(--accent2);font-size:12px;}
  
.project{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--amber);border-radius:18px;padding:16px 18px;margin-bottom:16px;}
.project:last-child{margin-bottom:0;}
.project-head{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-start;gap:10px; margin-bottom:8px;}
.project-title{font-weight:700;font-size:15px;line-height:1.3;}
.project-client{color:var(--muted);font-weight:500;font-size:12.5px;}
.project-date{font-family:var(--mono);font-size:11px;color:var(--amber);}
.project p{margin:0 0 10px;font-size:14px;color:#2b3033;line-height:1.75;}
.stack-line{font-family:var(--mono);font-size:11px;color:var(--amber);background:var(--amber-soft);display:inline-block;padding:4px 10px;border-radius:999px;}
  
footer.foot{margin-top:32px;padding-top:18px;border-top:1px solid var(--line);font-family:var(--mono);font-size:12px;color:var(--muted);text-align:center;}
  
/* ---------- loading / error ---------- */
.state-screen{max-width:560px;margin:80px auto;padding:0 20px;text-align:center;font-family:var(--mono);color:var(--muted);}
.state-screen .spinner{width:26px;height:26px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;margin:0 auto 18px;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.state-screen h2{font-size:15px;color:var(--ink);margin:0 0 10px;}
.state-screen p{font-size:13px;line-height:1.75;}
.state-screen code{display:block;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:12px 14px;margin:14px 0;text-align:left;color:var(--accent2);font-size:12px;overflow-x:auto;}
  
@media (max-width:960px){
  .layout-grid{grid-template-columns:1fr;}
  .sheet{padding:26px 20px 54px;}
}
@media (max-width:760px){
  .topbar{padding:10px 14px;}
  .topbar-inner{flex-direction:column;align-items:stretch;}
  .topbar nav,
  .search-group{flex:1 1 100%;}
  .search-group{margin-top:8px;}
}

/* ===================================================================
   PRINT — two-column dossier layout tuned to fit content onto the
   fewest possible pages without cutting anything. Sidebar (skills,
   education, achievements, languages) runs parallel to the timeline
   (summary, experience, projects) instead of stacking beneath it.
=================================================================== */
@media print{
  @page{ size:A4; margin:9mm 11mm; }
  @page :first { margin-top: 9mm; }
  .topbar{ display:none; }
  html, body { height:auto; }
  body {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  @supports (-webkit-touch-callout: none) {
    body { -webkit-print-color-adjust: exact; }
  }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  @media print {
    @page {
      margin: 9mm 11mm;
      marks: none;
    }
  }
  body{
    background:#fff; color:#191d1a;
    font-family:'Inter', Arial, Helvetica, sans-serif;
    font-size:8.7pt; line-height:1.34;
    print-color-adjust:exact; -webkit-print-color-adjust:exact;
  }
  .sheet{ max-width:100%; padding:0; }

  header.hero{ border-bottom:1.6pt solid #191d1a; padding-bottom:6pt; margin-bottom:7pt; }
  .eyebrow{ font-size:7.6pt; color:#0d6e5e; margin-bottom:3pt; }
  h1.name{ font-family:'Fraunces', Georgia, serif; font-size:19pt; margin-bottom:2pt; }
  .role{ font-size:9.6pt; margin-bottom:6pt; }
  .role span.tag{ color:#3a4a7a; }
  .contact-row{ font-size:7.8pt; gap:3pt 12pt; }
  .contact-row a{ color:#0d6e5e; border-bottom:none; font-weight:500; }
  .contact-row svg{ width:9px; height:9px; stroke:#0d6e5e; }

  .section-stack{ display:grid; gap:6pt; }
  .full-width-section{ display:grid; gap:4pt; }
  .layout-grid{ display:grid; grid-template-columns:1fr; gap:4pt; }
  .split-grid{ display:grid; grid-template-columns:56mm 1fr; gap:6mm; align-items:start; }
  .left-stack, .right-stack{ display:grid; gap:5pt; }
  .left-stack > section, .right-stack > section{ margin-bottom:0; break-inside:avoid; }

  .sec-head{ font-size:7.6pt; color:#3a4a7a; margin-bottom:5pt; letter-spacing:0.05em; }
  .sec-head::after{ background:#dfe3de; }

  .side .panel{ border:0.6pt solid #dde1db; border-radius:5px; padding:6pt 8pt; background:#fbfcfa; }
  .skill-row{ padding:3.5pt 0; border-bottom:0.5pt dashed #dfe3de; }
  .skill-key{ font-size:6.6pt; margin-bottom:2.5pt; }
  .chip{ font-size:6.9pt; padding:1.4pt 5pt; border-radius:4px; background:#eaedf7; color:#2a3670; }
  .edu-item{ margin-bottom:6pt; }
  .edu-item .deg{ font-size:8.1pt; }
  .edu-item .school{ font-size:7.3pt; }
  .edu-item .yr{ font-size:6.6pt; color:#0d6e5e; }
  .ach{ margin-bottom:6pt; }
  .ach b{ font-size:8.1pt; color:#0d6e5e; }
  .ach span{ font-size:7.3pt; }
  .lang-list{ gap:4pt; }
  .lang-chip{ font-size:7.3pt; padding:2pt 6pt; background:#e1f0ec; color:#0d6e5e; }

  p.summary{ font-size:8.7pt; max-width:100%; white-space:pre-wrap; }

  .job{ padding-left:10pt; margin-bottom:7pt; border-left:1.3pt solid #e1f0ec; break-inside:avoid; }
  .job::before{ left:-4.5pt; top:3.5pt; width:6.5pt; height:6.5pt; }
  .job-title{ font-size:8.9pt; }
  .job-meta{ font-size:6.9pt; padding:1.4pt 6pt; }
  .job-loc{ font-size:7.3pt; margin-bottom:3pt; }
  ul.bullets li{ font-size:8.1pt; padding-left:10pt; margin-bottom:2pt; }
  ul.bullets li::before{ font-size:7pt; }

  .project{ border:0.6pt solid #dde1db; border-left:2pt solid #a3661c; border-radius:5px; padding:5.5pt 7.5pt; margin-bottom:5pt; background:#fefdfb; break-inside:avoid; }
  .project-title{ font-size:8.5pt; }
  .project-client{ font-size:7pt; }
  .project-date{ font-size:6.9pt; }
  .project p{ font-size:7.8pt; margin:3pt 0; }
  .stack-line{ font-size:6.7pt; padding:1.6pt 6pt; margin-top:3pt; }

  footer.foot{ display:block; margin-top:7pt; padding-top:5pt; font-size:6.3pt; }
  a{ color:#0d6e5e !important; }
}
</style>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand"><b>Resume</b> · <span id="dataFileLabel">Professional profile</span></div>
    <nav aria-label="Resume sections">
      <a class="nav-link" href="#summary">Summary</a>
      <a class="nav-link" href="#experience">Experience</a>
      <a class="nav-link" href="#projects">Projects</a>
      <a class="nav-link" href="#skills">Skills</a>
      <a class="nav-link" href="#education">Education</a>
    </nav>
    <div class="search-group">
      <input id="searchInput" type="search" placeholder="Search resume…" aria-label="Search resume" autocomplete="off" />
      <button id="clearSearchBtn" type="button" aria-label="Clear search">✕</button>
    </div>
    <button class="btn primary" id="downloadBtn" onclick="window.print()" disabled aria-label="Print or save resume as PDF">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v3a1 1 0 001 1h14a1 1 0 001-1v-3"/></svg>
      Print / PDF
    </button>
  </div>
</div>

<div id="app">
  <div class="state-screen" id="loadingState">
    <div class="spinner"></div>
    <h2>loading resume-data.json…</h2>
    <p>Reading structured content and rendering the page.</p>
  </div>
</div>

<script>
async function loadResume() {
  const app = document.getElementById('app');
  try {
    const res = await fetch('resume-data.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    render(data);
    document.getElementById('downloadBtn').disabled = false;
    activateSearch();
    activateSectionObserver();
  } catch (err) {
    app.innerHTML = errorScreen(err);
  }
}

function errorScreen(err) {
  return `
  <div class="state-screen">
    <h2>Couldn't load resume-data.json</h2>
    <p>${escapeHtml(String(err.message || err))}</p>
    <p>This usually happens when the HTML file is opened directly (<code style="display:inline;padding:1px 5px;">file://</code>) — browsers block local JSON fetches for security. Serve both files from a local folder instead:</p>
    <code>python3 -m http.server 8000<br>&nbsp;&nbsp;# then open http://localhost:8000/index.html</code>
    <p>Or use a tool like VS Code's "Live Server" extension. Make sure <b>index.html</b> and <b>resume-data.json</b> are in the same folder.</p>
  </div>`;
}

function escapeHtml(str){
  return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function chip(text){ return `<span class="chip">${text}</span>`; }

function normalizeText(value) {
  return value.replace(/\s+/g, ' ').trim().toLowerCase();
}

function applySearchFilter(query) {
  const search = normalizeText(query || '');
  const items = document.querySelectorAll('.searchable');
  let anyVisible = false;

  items.forEach(item => {
    const match = !search || normalizeText(item.textContent || '').includes(search);
    item.style.display = match ? '' : 'none';
    if (match) anyVisible = true;
  });

  let message = document.getElementById('searchMessage');
  if (!search) {
    if (message) message.remove();
    return;
  }

  if (!message) {
    message = document.createElement('div');
    message.id = 'searchMessage';
    message.className = 'state-screen';
    message.innerHTML = `<h2>No results found</h2><p>Try a different keyword like <strong>Angular</strong>, <strong>Spring</strong>, or <strong>lead</strong>.</p>`;
    const sheet = document.querySelector('.sheet');
    if (sheet) sheet.querySelector('.hero')?.after(message);
  }
  message.style.display = anyVisible ? 'none' : '';
}

function activateSearch() {
  const searchInput = document.getElementById('searchInput');
  const clearButton = document.getElementById('clearSearchBtn');
  if (!searchInput || !clearButton) return;

  searchInput.addEventListener('input', () => applySearchFilter(searchInput.value));
  clearButton.addEventListener('click', () => {
    searchInput.value = '';
    applySearchFilter('');
    searchInput.focus();
  });
}

function activateSectionObserver() {
  const navLinks = Array.from(document.querySelectorAll('.nav-link'));
  const sections = navLinks.map(link => document.querySelector(link.getAttribute('href'))).filter(Boolean);
  if (!sections.length) return;

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      const id = entry.target.id;
      const link = navLinks.find(a => a.getAttribute('href') === `#${id}`);
      if (link) link.classList.toggle('active', entry.isIntersecting);
    });
  }, { rootMargin: '-30% 0px -55% 0px', threshold: 0 });

  sections.forEach(section => observer.observe(section));
}

function render(data) {
  const pageTitle = `${data.name} | ${data.title}`;
  document.title = pageTitle;
  document.querySelector('meta[name="description"]').setAttribute('content', `${data.summary.replace(/\s+/g, ' ').trim().slice(0, 155)}...`);
  document.querySelector('meta[property="og:title"]').setAttribute('content', pageTitle);
  document.querySelector('meta[property="og:description"]').setAttribute('content', `${data.summary.replace(/\s+/g, ' ').trim().slice(0, 200)}...`);
  document.querySelector('meta[name="twitter:title"]').setAttribute('content', pageTitle);
  document.querySelector('meta[name="twitter:description"]').setAttribute('content', `${data.summary.replace(/\s+/g, ' ').trim().slice(0, 200)}...`);
  const roleTags = data.titleTags.map(t => `<span class="tag">${t}</span>`).join(' · ');

  const contactBits = [];
  if (data.contact.email) {
    contactBits.push(`<a href="mailto:${data.contact.email}" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18v12H3z"/><path d="M3 6l9 7 9-7"/></svg>
      ${data.contact.email}
    </a>`);
  }
  if (data.contact.phone) {
    contactBits.push(`<span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.13.96.36 1.9.68 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.91.32 1.85.55 2.81.68A2 2 0 0122 16.92z"/></svg>
      ${data.contact.phone}
    </span>`);
  }
  if (data.contact.github) contactBits.push(`<a href="${data.contact.github}" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5a12 12 0 00-3.8 23.1c.6.1.8-.3.8-.6v-2.2c-3.3.7-4-1.4-4-1.4-.5-1.3-1.2-1.7-1.2-1.7-1-.7.1-.7.1-.7 1.1.1 1.7 1.2 1.7 1.2 1 .1 2.9.7 3.7 1.3.1-.9.4-1.6.8-2-2.7-.3-5.5-1.3-5.5-5.9 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2a11.2 11.2 0 016 0c2.3-1.5 3.3-1.2 3.3-1.2.6 1.7.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A12 12 0 0012 .5z"/></svg>
      GitHub
    </a>`);
  if (data.contact.linkedin) contactBits.push(`<a href="${data.contact.linkedin}" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.94 8.5A1.56 1.56 0 1 0 6.94 5.37a1.56 1.56 0 0 0 0 3.13ZM5.5 9.75h2.88V18H5.5zM10.3 9.75h2.76v1.12h.04c.38-.72 1.32-1.48 2.72-1.48 2.9 0 3.44 1.91 3.44 4.39V18H16.9v-7.44c0-1.77-.03-4.05-2.47-4.05-2.47 0-2.85 1.93-2.85 3.92V18H10.3z"/></svg>
      LinkedIn
    </a>`);
  if (data.location) contactBits.push(`<span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s7-5.8 7-12a7 7 0 10-14 0c0 6.2 7 12 7 12z"/><circle cx="12" cy="9" r="2.5"/></svg>
      ${data.location}
    </span>`);

  const skillsHtml = data.skills.map(row => `
    <div class="skill-row searchable">
      <div class="skill-key">${row.key.replace(/_/g,' ')}</div>
      <div class="chip-list">${row.items.map(chip).join('')}</div>
    </div>`).join('');

  const experienceHtml = data.experience.map(job => `
    <div class="job searchable">
      <div class="job-head">
        <div class="job-title">${job.title} <span class="co">@ ${job.company}</span></div>
        <div class="job-meta">${job.dates}</div>
      </div>
      <div class="job-loc">${job.location}</div>
      <ul class="bullets">${job.bullets.map(b => `<li>${b}</li>`).join('')}</ul>
    </div>`).join('');

  const projectsHtml = data.projects.map(p => `
    <div class="project searchable">
      <div class="project-head">
        <div class="project-title">${p.title} <span class="project-client">— ${p.client}</span></div>
        <div class="project-date">${p.dates}</div>
      </div>
      <p>${p.description}</p>
      <span class="stack-line">${p.stack.join(' · ')}</span>
    </div>`).join('');

  const educationHtml = data.education.map(e => `
    <div class="edu-item searchable">
      <div class="deg">${e.degree}</div>
      <div class="school">${e.school}</div>
      <div class="yr">${e.years}</div>
    </div>`).join('');

  const achievementsHtml = data.achievements.map(a => `
    <div class="ach searchable">
      <b>${a.title}</b>
      <span>${a.description}</span>
    </div>`).join('');

  const languagesHtml = data.languages.map(l => `
    <span class="lang-chip searchable">${l.name} — ${l.level}</span>`).join('');

  document.getElementById('app').innerHTML = `
  <main class="sheet" role="main">
    <header class="hero">
      <p class="eyebrow">Resume · Updated ${data.lastUpdated}</p>
      <h1 class="name">${data.name}</h1>
      <p class="role">${data.title} <span class="sep">/</span> ${roleTags}</p>
      <div class="contact-row">${contactBits.join('')}</div>
    </header>

    <div class="section-stack">
      <section id="summary" class="full-width-section">
        <p class="sec-head">Summary</p>
        <div class="panel">
          <p class="summary">${data.summary}</p>
        </div>
      </section>

      <div class="layout-grid">
        <div class="content">
          <section id="experience">
            <p class="sec-head">Experience</p>
            ${experienceHtml}
          </section>

          <section id="projects">
            <p class="sec-head">Selected Projects</p>
            ${projectsHtml}
          </section>
        </div>

        <aside class="sidebar">
          <section id="skills">
            <p class="sec-head">Skills</p>
            <div class="panel">${skillsHtml}</div>
          </section>

          <section id="education">
            <p class="sec-head">Education</p>
            <div class="panel">${educationHtml}</div>
          </section>

          <section id="achievements">
            <p class="sec-head">Achievements</p>
            <div class="panel">${achievementsHtml}</div>
          </section>

          <section id="languages">
            <p class="sec-head">Languages</p>
            <div class="panel"><div class="lang-list">${languagesHtml}</div></div>
          </section>
        </aside>
      </div>
    </div>

    <footer class="foot">
      Updated ${data.lastUpdated} · Built to share and print professionally
    </footer>
  </main>
  `;
}

loadResume();
</script>
</body>
</html>
