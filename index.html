<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume — Loading…</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #f5f6f3;
    --panel: #ffffff;
    --ink: #171a1c;
    --muted: #5b6269;
    --line: #dfe3de;
    --accent: #0b6e4f;
    --accent-soft: #e4f2ec;
    --accent2: #33449e;
    --accent2-soft: #e9ebf7;
    --amber: #a6631a;
    --amber-soft: #f5ead9;
    --radius: 10px;
    --mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --sans: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }

  .topbar{
    position:sticky;
    top:0;
    z-index:50;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:12px 20px;
    background:rgba(245,246,243,0.9);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .topbar .brand{
    font-family:var(--mono);
    font-size:13px;
    color:var(--muted);
    letter-spacing:0.02em;
  }
  .topbar .brand b{ color:var(--ink); }
  .actions{ display:flex; gap:10px; }
  .btn{
    font-family:var(--mono);
    font-size:13px;
    font-weight:500;
    border-radius:8px;
    padding:9px 16px;
    border:1px solid var(--line);
    background:var(--panel);
    color:var(--ink);
    cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
    display:inline-flex;
    align-items:center;
    gap:8px;
  }
  .btn:hover{ transform:translateY(-1px); box-shadow:0 4px 12px rgba(20,30,25,0.08); }
  .btn:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  .btn.primary{ background:var(--ink); color:#fbfbf9; border-color:var(--ink); }
  .btn.primary:hover{ background:#000; }
  .btn:disabled{ opacity:0.45; cursor:not-allowed; transform:none; box-shadow:none; }
  .btn svg{ width:14px; height:14px; }

  .sheet{ max-width:820px; margin:0 auto; padding:44px 28px 90px; }

  header.hero{ padding-bottom:26px; margin-bottom:30px; border-bottom:1px solid var(--line); }
  .prompt{
    font-family:var(--mono); font-size:13px; color:var(--accent);
    margin:0 0 14px; display:flex; align-items:center; gap:2px;
  }
  .prompt .path{ color:var(--muted); }
  .prompt .cursor{
    display:inline-block; width:8px; height:15px; background:var(--accent);
    margin-left:4px; animation:blink 1.1s step-end infinite;
  }
  @media (prefers-reduced-motion: reduce){ .prompt .cursor{ animation:none; } }
  @keyframes blink{ 50%{ opacity:0; } }

  h1.name{
    font-family:var(--mono); font-size:clamp(28px,4.4vw,40px);
    font-weight:700; letter-spacing:-0.01em; margin:0 0 6px;
  }
  .role{ font-size:17px; color:var(--muted); margin:0 0 18px; font-weight:500; }
  .role .sep{ color:var(--line); margin:0 8px; }
  .role span.tag{ color:var(--accent2); }

  .contact-row{ display:flex; flex-wrap:wrap; gap:10px 18px; font-family:var(--mono); font-size:12.5px; }
  .contact-row a, .contact-row span{
    color:var(--ink); text-decoration:none; display:inline-flex; align-items:center; gap:6px;
  }
  .contact-row a{ border-bottom:1px solid var(--line); padding-bottom:1px; }
  .contact-row a:hover{ border-color:var(--accent); color:var(--accent); }
  .contact-row svg{ width:13px; height:13px; opacity:0.7; }

  section{ margin-bottom:34px; }
  .sec-head{
    font-family:var(--mono); font-size:13px; color:var(--accent2);
    margin:0 0 16px; display:flex; align-items:center; gap:10px; white-space:nowrap;
  }
  .sec-head::before{ content:"//"; color:var(--line); font-weight:700; }
  .sec-head::after{ content:""; flex:1; height:1px; background:var(--line); }

  p.summary{ font-size:15px; color:#2b3033; max-width:70ch; }

  .skills-block{ background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:18px 20px; }
  .skill-row{
    display:grid; grid-template-columns:180px 1fr; gap:14px; padding:8px 0;
    border-bottom:1px dashed var(--line); align-items:baseline;
  }
  .skill-row:last-child{ border-bottom:none; }
  .skill-key{ font-family:var(--mono); font-size:12.5px; color:var(--muted); }
  .skill-key::after{ content:":"; color:var(--line); }
  .chip-list{ display:flex; flex-wrap:wrap; gap:6px; }
  .chip{
    font-family:var(--mono); font-size:12px; background:var(--accent2-soft);
    color:var(--accent2); padding:3px 9px; border-radius:6px; white-space:nowrap;
  }

  .job{ position:relative; padding-left:22px; margin-bottom:22px; }
  .job::before{
    content:""; position:absolute; left:0; top:6px; width:9px; height:9px;
    border-radius:2px; background:var(--accent);
  }
  .job-head{
    display:flex; flex-wrap:wrap; align-items:baseline; justify-content:space-between;
    gap:8px 16px; margin-bottom:2px;
  }
  .job-title{ font-size:15.5px; font-weight:600; }
  .job-title .co{ color:var(--accent); }
  .job-meta{ font-family:var(--mono); font-size:11.5px; color:var(--muted); white-space:nowrap; }
  .job-loc{ font-size:12.5px; color:var(--muted); margin-bottom:8px; font-style:italic; }
  ul.bullets{ margin:0; padding-left:0; list-style:none; }
  ul.bullets li{ position:relative; padding-left:18px; margin-bottom:5px; font-size:14px; color:#2b3033; }
  ul.bullets li::before{ content:"▸"; position:absolute; left:0; color:var(--accent2); font-size:12px; top:2px; }

  .project{ background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px; margin-bottom:14px; }
  .project-head{ display:flex; flex-wrap:wrap; justify-content:space-between; align-items:baseline; gap:6px 14px; margin-bottom:4px; }
  .project-title{ font-weight:600; font-size:14.5px; }
  .project-client{ color:var(--muted); font-weight:400; font-size:13px; }
  .project-date{ font-family:var(--mono); font-size:11.5px; color:var(--muted); }
  .project p{ margin:6px 0; font-size:13.5px; color:#2b3033; }
  .stack-line{
    font-family:var(--mono); font-size:11.5px; color:var(--amber); background:var(--amber-soft);
    display:inline-block; padding:3px 8px; border-radius:6px; margin-top:6px;
  }

  .grid-3{ display:grid; grid-template-columns:1fr 1fr; gap:24px; }
  .card{ background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px; }
  .card h3{
    margin:0 0 10px; font-size:12.5px; font-family:var(--mono); color:var(--muted);
    text-transform:uppercase; letter-spacing:0.04em;
  }
  .edu-item{ margin-bottom:10px; font-size:13.5px; }
  .edu-item .deg{ font-weight:600; }
  .edu-item .school{ color:var(--muted); font-size:12.5px; }
  .edu-item .yr{ font-family:var(--mono); font-size:11px; color:var(--muted); }

  .ach{ font-size:13.5px; margin-bottom:10px; }
  .ach b{ display:block; color:var(--ink); margin-bottom:2px; }
  .ach span{ color:var(--muted); }

  .lang-list{ display:flex; flex-wrap:wrap; gap:8px; }
  .lang-chip{
    font-size:12.5px; padding:4px 10px; border-radius:20px;
    background:var(--accent-soft); color:var(--accent); font-family:var(--mono);
  }

  footer.foot{
    margin-top:40px; padding-top:18px; border-top:1px solid var(--line);
    font-family:var(--mono); font-size:11px; color:var(--muted); text-align:center;
  }

  /* ---------- Loading / error states ---------- */
  .state-screen{
    max-width:560px; margin:80px auto; padding:0 20px; text-align:center;
    font-family:var(--mono); color:var(--muted);
  }
  .state-screen .spinner{
    width:26px; height:26px; border:2px solid var(--line); border-top-color:var(--accent);
    border-radius:50%; margin:0 auto 18px; animation:spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .state-screen h2{ font-size:14px; color:var(--ink); margin:0 0 10px; }
  .state-screen p{ font-size:12.5px; line-height:1.7; }
  .state-screen code{
    display:block; background:var(--panel); border:1px solid var(--line); border-radius:6px;
    padding:10px 12px; margin:14px 0; text-align:left; color:var(--accent2); font-size:11.5px;
    overflow-x:auto;
  }

  @media (max-width:640px){
    .skill-row{ grid-template-columns:1fr; gap:4px; }
    .grid-3{ grid-template-columns:1fr; }
    .topbar{ padding:10px 14px; }
    .sheet{ padding:28px 16px 60px; }
  }

  @media print{
    .topbar{ display:none; }
    body{ background:#fff; }
    .sheet{ max-width:100%; padding:0 6mm; }
    .skills-block, .project, .card{ box-shadow:none; }
    a{ color:inherit !important; }
    .prompt .cursor{ display:none; }
    section{ break-inside:avoid; margin-bottom:20px; }
    .job, .project{ break-inside:avoid; }
  }
</style>
</head>
<body>

  <div class="topbar">
    <div class="brand"><b>resume</b>.render(<span id="dataFileLabel">resume-data.json</span>)</div>
    <div class="actions">
      <button class="btn primary" id="downloadBtn" onclick="window.print()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v3a1 1 0 001 1h14a1 1 0 001-1v-3"/></svg>
        Download PDF
      </button>
    </div>
  </div>

  <div id="app">
    <div class="state-screen" id="loadingState">
      <div class="spinner"></div>
      <h2>loading resume-data.json…</h2>
      <p>Reading structured content and rendering the page.</p>
    </div>
  </div>

<script>
async function loadResume() {
  const app = document.getElementById('app');
  try {
    const res = await fetch('resume-data.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    render(data);
    document.getElementById('downloadBtn').disabled = false;
  } catch (err) {
    app.innerHTML = errorScreen(err);
  }
}

function errorScreen(err) {
  return `
    <div class="state-screen">
      <h2>Couldn't load resume-data.json</h2>
      <p>${escapeHtml(String(err.message || err))}</p>
      <p>This usually happens when the HTML file is opened directly (<code style="display:inline;padding:1px 5px;">file://</code>) — browsers block local JSON fetches for security. Serve both files from a local folder instead:</p>
      <code>python3 -m http.server 8000<br>&nbsp;&nbsp;# then open http://localhost:8000/resume.html</code>
      <p>Or use a tool like VS Code's "Live Server" extension. Make sure <b>resume.html</b> and <b>resume-data.json</b> are in the same folder.</p>
    </div>`;
}

function escapeHtml(str){
  return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function chip(text){ return `<span class="chip">${text}</span>`; }

function render(data) {
  document.title = `${data.name} — ${data.title}`;

  const roleTags = data.titleTags.map(t => `<span class="tag">${t}</span>`).join(' · ');

  const contactBits = [];
  if (data.contact.email) {
    contactBits.push(`<a href="mailto:${data.contact.email}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18v12H3z"/><path d="M3 6l9 7 9-7"/></svg>
      ${data.contact.email}
    </a>`);
  }
  if (data.contact.phone) {
    contactBits.push(`<span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.13.96.36 1.9.68 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.91.32 1.85.55 2.81.68A2 2 0 0122 16.92z"/></svg>
      ${data.contact.phone}
    </span>`);
  }
  if (data.contact.github) contactBits.push(`<a href="${data.contact.github}">GitHub</a>`);
  if (data.contact.linkedin) contactBits.push(`<a href="${data.contact.linkedin}">LinkedIn</a>`);
  if (data.location) contactBits.push(`<span>${data.location}</span>`);

  const skillsHtml = data.skills.map(row => `
    <div class="skill-row">
      <div class="skill-key">${row.key}</div>
      <div class="chip-list">${row.items.map(chip).join('')}</div>
    </div>`).join('');

  const experienceHtml = data.experience.map(job => `
    <div class="job">
      <div class="job-head">
        <div class="job-title">${job.title} <span class="co">@ ${job.company}</span></div>
        <div class="job-meta">${job.dates}</div>
      </div>
      <div class="job-loc">${job.location}</div>
      <ul class="bullets">${job.bullets.map(b => `<li>${b}</li>`).join('')}</ul>
    </div>`).join('');

  const projectsHtml = data.projects.map(p => `
    <div class="project">
      <div class="project-head">
        <div class="project-title">${p.title} <span class="project-client">— ${p.client}</span></div>
        <div class="project-date">${p.dates}</div>
      </div>
      <p>${p.description}</p>
      <span class="stack-line">${p.stack.join(' · ')}</span>
    </div>`).join('');

  const educationHtml = data.education.map(e => `
    <div class="edu-item">
      <div class="deg">${e.degree}</div>
      <div class="school">${e.school}</div>
      <div class="yr">${e.years}</div>
    </div>`).join('');

  const achievementsHtml = data.achievements.map(a => `
    <div class="ach">
      <b>${a.title}</b>
      <span>${a.description}</span>
    </div>`).join('');

  const languagesHtml = data.languages.map(l => `
    <span class="lang-chip">${l.name} — ${l.level}</span>`).join('');

  document.getElementById('app').innerHTML = `
    <div class="sheet">
      <header class="hero">
        <p class="prompt"><span class="path">~/careers/${data.name.toLowerCase().replace(/\s+/g,'-')}</span> % whoami<span class="cursor"></span></p>
        <h1 class="name">${data.name}</h1>
        <p class="role">${data.title} <span class="sep">/</span> ${roleTags}</p>
        <div class="contact-row">${contactBits.join('')}</div>
      </header>

      <section id="summary">
        <p class="sec-head">summary.md</p>
        <p class="summary">${data.summary}</p>
      </section>

      <section id="skills">
        <p class="sec-head">skills.yaml</p>
        <div class="skills-block">${skillsHtml}</div>
      </section>

      <section id="experience">
        <p class="sec-head">experience.log</p>
        ${experienceHtml}
      </section>

      <section id="projects">
        <p class="sec-head">projects/</p>
        ${projectsHtml}
      </section>

      <section id="bottom">
        <p class="sec-head">education_and_more.json</p>
        <div class="grid-3">
          <div class="card">
            <h3>Education</h3>
            ${educationHtml}
          </div>
          <div class="card">
            <h3>Key Achievements</h3>
            ${achievementsHtml}
          </div>
        </div>
        <div class="card" style="margin-top:24px;">
          <h3>Languages</h3>
          <div class="lang-list">${languagesHtml}</div>
        </div>
      </section>

      <footer class="foot">
        Last updated ${data.lastUpdated} · Generated as a living document — click "Download PDF" above for a portable copy
      </footer>
    </div>
  `;
}

loadResume();
</script>
</body>
</html>
